name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify Mapbox token is available for build
        env:
          PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          if [ -z "${PUBLIC_MAPBOX_ACCESS_TOKEN}" ]; then
            echo "::error::PUBLIC_MAPBOX_ACCESS_TOKEN is empty. Add it under Settings → Secrets and variables → Actions → Secrets (Repository secrets), name exactly PUBLIC_MAPBOX_ACCESS_TOKEN. Environment-only secrets are not visible to this job."
            exit 1
          fi
          echo "PUBLIC_MAPBOX_ACCESS_TOKEN is set (length ${#PUBLIC_MAPBOX_ACCESS_TOKEN} chars)."

      - name: build
        env:
          GITHUB_PAGES_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_MAPBOX_ACCESS_TOKEN: ${{ secrets.PUBLIC_MAPBOX_ACCESS_TOKEN }}
        run: |
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "build/"

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
